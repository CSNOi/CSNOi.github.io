baseURL = "https://csnoi.github.io/"
languageCode = "zh-cn"            # 建议改为中文，对国内访问者更友好
title = "陈坤葳 (Kunwei Chen) | AI & Robotics"
theme = "prav"
ignoreErrors = ["error-missing-instagram-accesstoken"]

# 语法高亮优化：建议改用 monokai 或 solarized-dark，更符合程序员审美
pygmentsCodeFences = true
pygmentsStyle = "monokai"

[params]
    title = "陈坤葳"
    # tagline 建议改成你的核心研究方向，而不是默认的 Lorem ipsum
    tagline = "专注于深度学习、VSLAM 与大模型微调 (SAM3)"
    author = "陈坤葳 (Kunwei Chen)"
    
    # 确保你的图片放在 static/img/profile.jpg
    authorImgPath = "/img/profile.jpg" 
    
    # Blurb 建议写得更具体，展示技术栈
    authorBlurb = "AI 与机器人方向研究者。目前专注于 SAM3 微调、VSLAM 算法优化及 ROS 2 系统开发。热衷于探索计算机视觉与底层硬件的结合。"

[social]
    email = "mailto:WorkKunweiChen@outlook.com" # 加上 mailto: 点击可直接发邮件
    github = "https://github.com/CSNOi"
    # 注意：该主题可能不原生支持 QQ 图标，如果显示不出来，建议保留 GitHub 和 Email
    # 或者在这里添加你的 LinkedIn 或其他学术平台链接

[markup]
    [markup.goldmark]
        [markup.goldmark.renderer]
            unsafe = true  # 保持开启，用于渲染 Markdown 中的 HTML

# 进阶建议：添加菜单导航（如果主题支持）
[[menu.main]]
    name = "首页"
    url = "/"
    weight = 1

[[menu.main]]
    name = "技术博客"
    url = "/posts/"
    weight = 2

[[menu.main]]
    name = "关于我"
    url = "/about/"
    weight = 3