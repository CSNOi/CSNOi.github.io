# --- 全局基础配置 ---
baseURL = "https://csnoi.github.io/"
defaultContentLanguage = "zh-cn" # 设置默认打开的语言为中文
theme = "hugo-profile"

# ==========================================
# 多语言配置区域
# ==========================================
[languages]

  # ----------------------------------------
  # 1. 中文版配置 (zh-cn)
  # ----------------------------------------
  [languages.zh-cn]
    title = "陈坤葳"
    languageName = "中/CN" # 语言切换器上显示的文字
    weight = 1

    [languages.zh-cn.params]
      title = "陈坤葳"
      description = "AI算法工程师，专注于机器视觉、多传感器融合与AI可解释性理论"
      image = "img/profile.jpg"
      
      [languages.zh-cn.params.navbar]
        align = "right"
        showLogo = true
        logoText = "Kunwei Chen"
        
      [languages.zh-cn.params.hero]
        enable = true
        title = "你好，我是 陈坤葳"
        subtitle = "深耕 AI 可解释性理论与高精度 VSLAM 定位"
        content = "北京化工大学人工智能背景，法学双学位复合背景。目前在灵心巧手(北京)科技有限公司担任算法工程师，致力于让黑盒模型变得透明，让机器人感知更加精准。"
        image = "img/profile.jpg" 
        
      # (这里可以继续保留中文版的 about, skills, experience 等，前面加上 languages.zh-cn.params 前缀)
      
      [languages.zh-cn.params.skills]
        enable = true
        title = "技术栈"
        # ... 中文技能列表 ...

  # ----------------------------------------
  # 2. 英文版配置 (en)
  # ----------------------------------------
  [languages.en]
    title = "Kunwei Chen | AI & Robotics"
    languageName = "En/US" # 语言切换器上显示的文字
    weight = 2

    [languages.en.params]
      title = "Kunwei Chen"
      description = "AI Algorithm Engineer focusing on Computer Vision, Sensor Fusion, and XAI."
      image = "img/profile.jpg"
      
      [languages.en.params.navbar]
        align = "right"
        showLogo = true
        logoText = "Kunwei Chen"
        
      [languages.en.params.hero]
        enable = true
        title = "Hi, I'm Kunwei Chen"
        subtitle = "Focusing on Mechanistic Interpretability & High-Precision VSLAM"
        content = "With a dual degree in AI and Law from BUCT, I currently work as an Algorithm Engineer at Lingxin Qiaoshou. I am passionate about opening the AI black box and making robot perception more precise."
        image = "img/profile.jpg" 

      # 英文版技能卡片
      [languages.en.params.skills]
        enable = true
        title = "Tech Stack"
        [[languages.en.params.skills.list]]
            icon = "cpu"
            title = "Low-Level Dev"
            info = "CUDA C, Assembly Optimization, STM32"
        [[languages.en.params.skills.list]]
            icon = "eye"
            title = "Computer Vision"
            info = "VSLAM, OpenCV, SAM3"

# --- 社交链接 (全站通用，放在最外层) ---
[social]
    github = "https://github.com/CSNOi"
    email = "WorkKunweiChen@outlook.com"
    instagram = "topocat001"