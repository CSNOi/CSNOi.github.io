      [languages.zh-cn.params.about]
        enable = true
        title = "关于我"
        image = "/img/profile.jpg"
        content = "我对神经网络的底层机制有着浓厚的兴趣，研究方向涵盖特征可视化与特征反向工程。在工程实践上，具备从底层驱动开发（STM32/CUDA C）到上层感知算法（VSLAM/SAM3）的全栈落地能力。"

      [languages.zh-cn.params.skills]
