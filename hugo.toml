# ==========================================
# 全局基础配置
# ==========================================
baseURL = "https://csnoi.github.io/"
defaultContentLanguage = "zh-cn"
theme = "hugo-profile"
enableRobotsTXT = true

[languages]
  # ----------------------------------------
  # 1. 中文版配置 (zh-cn)
  # ----------------------------------------
  [languages.zh-cn]
    title = "陈坤葳 | AI & Robotics"
    languageName = "中/CN"
    weight = 1

    [languages.zh-cn.params]
      title = "陈坤葳"
      description = "AI算法工程师，专注于机器视觉、多传感器融合与AI可解释性理论"
      image = "/img/profile.jpg"
      
      [languages.zh-cn.params.navbar]
        align = "left"
        showLogo = true
        logoText = "陈坤葳"
        
      [languages.zh-cn.params.hero]
        enable = true
        title = "你好，我是 陈坤葳"
        subtitle = "深耕 AI 可解释性理论与高精度 VSLAM 定位"
        content = "北京化工大学人工智能背景，法学双学位复合背景。目前担任算法工程师，致力于让黑盒模型变得透明，让机器人感知更加精准。"
        image = "/img/profile.jpg" 
        
        # 🟢 修复：添加 GitHub 和邮箱图标到首页
        [languages.zh-cn.params.hero.socialLinks]
          [[languages.zh-cn.params.hero.socialLinks.fontAwesomeIcons]]
              icon = "fab fa-github"
              url = "https://github.com/CSNOi"
          [[languages.zh-cn.params.hero.socialLinks.fontAwesomeIcons]]
              icon = "fas fa-envelope"
              url = "mailto:WorkKunweiChen@outlook.com"
              
      [languages.zh-cn.params.about]
        enable = true
        title = "关于我"
        image = "/img/profile.jpg"
        content = "我对神经网络的底层机制有着浓厚的兴趣，研究方向涵盖特征可视化与特征反向工程。在工程实践上，具备从底层驱动开发（STM32/CUDA C）到上层感知算法（VSLAM/SAM3）的全栈落地能力。"

      [languages.zh-cn.params.skills]
        enable = true
        title = "技术栈"
        [[languages.zh-cn.params.skills.items]]
            icon = "cpu"
            title = "底层开发"
            info = "CUDA C, 汇编优化, STM32"
        [[languages.zh-cn.params.skills.items]]
            icon = "eye"
            title = "机器视觉"
            info = "VSLAM, OpenCV, SAM3"
        [[languages.zh-cn.params.skills.items]]
            icon = "code"
            title = "AI 理论"
            info = "可解释性理论 (XAI), TransformerLens"

      [languages.zh-cn.params.experience]
        enable = true
        title = "工作与实习"
        [[languages.zh-cn.params.experience.items]]
            # 🟢 修复：必须使用英文名防止 ID 解析崩溃，中文名转移到 job 中
            company = "Lingxin Tech" 
            job = "算法工程师 @ 灵心巧手(北京)科技"
            date = "2026.01 - 至今"
            content = "负责机器人视觉相关工作、高精度多传感器融合视觉定位及模型部署。"

      [languages.zh-cn.params.education]
        enable = true
        title = "教育经历"
        [[languages.zh-cn.params.education.items]]
            # 🟢 修复：官方键名为 title
            title = "人工智能 (本科)"
            school = { name = "北京化工大学", url = "https://www.buct.edu.cn/" }
            date = "2020.09 - 2024.06"
            content = "GPA: 3.12。主修：机器学习(90)、深度学习与神经网络(91)、图像理解与机器视觉(91)。"
        [[languages.zh-cn.params.education.items]]
            title = "法学 (第二学位)"
            school = { name = "北京化工大学", url = "https://www.buct.edu.cn/" }
            date = "2024.09 - 至今"
            content = "探索 AI 合规、安全与可信计算的跨学科领域。"

      # 🟢 修复：在网页底部启用并添加联系方式模块
      [languages.zh-cn.params.contact]
        enable = true
        title = "联系方式"
        content = "我非常期待与志同道合的开发者、研究人员进行技术交流。如果您对我的算法部署感兴趣，或者有合作机会，欢迎随时邮件联系我。"
        email = "WorkKunweiChen@outlook.com"
        btnName = "发送邮件"

  # ----------------------------------------
  # 2. 英文版配置 (en)
  # ----------------------------------------
  [languages.en]
    title = "Kunwei Chen | AI & Robotics"
    languageName = "En/US"
    weight = 2

    [languages.en.params]
      title = "Kunwei Chen"
      description = "AI Algorithm Engineer focusing on Computer Vision, Sensor Fusion, and XAI."
      image = "/img/profile.jpg"
      
      [languages.en.params.navbar]
        align = "left"
        showLogo = true
        logoText = "Kunwei Chen"
        
      [languages.en.params.hero]
        enable = true
        title = "Hi, I'm Kunwei Chen"
        subtitle = "Focusing on Mechanistic Interpretability & High-Precision VSLAM"
        content = "With a dual degree in AI and Law from BUCT, I currently work as an Algorithm Engineer. I am passionate about opening the AI black box and making robot perception more precise."
        image = "/img/profile.jpg" 

        [languages.en.params.hero.socialLinks]
          [[languages.en.params.hero.socialLinks.fontAwesomeIcons]]
              icon = "fab fa-github"
              url = "https://github.com/CSNOi"
          [[languages.en.params.hero.socialLinks.fontAwesomeIcons]]
              icon = "fas fa-envelope"
              url = "mailto:WorkKunweiChen@outlook.com"

      [languages.en.params.about]
        enable = true
        title = "About Me"
        image = "/img/profile.jpg"
        content = "I have a deep interest in the underlying mechanisms of neural networks. My research involves feature visualization and mechanistic interpretability. On the engineering side, I have full-stack experience from low-level driver development (STM32/CUDA C) to high-level perception (VSLAM/SAM3)."

      [languages.en.params.skills]
        enable = true
        title = "Tech Stack"
        [[languages.en.params.skills.items]]
            icon = "cpu"
            title = "Low-Level Dev"
            info = "CUDA C, Assembly Optimization, STM32"
        [[languages.en.params.skills.items]]
            icon = "eye"
            title = "Computer Vision"
            info = "VSLAM, OpenCV, SAM3"
        [[languages.en.params.skills.items]]
            icon = "code"
            title = "AI Theory"
            info = "Mechanistic Interpretability (XAI), Transformer Circuits"

      [languages.en.params.experience]
        enable = true
        title = "Experience"
        [[languages.en.params.experience.items]]
            company = "Lingxin Tech" 
            job = "Algorithm Engineer @ Lingxin Qiaoshou"
            date = "Jan 2026 - Present"
            content = "Responsible for robot vision, high-precision multi-sensor fusion VSLAM, and model deployment."

      [languages.en.params.education]
        enable = true
        title = "Education"
        [[languages.en.params.education.items]]
            title = "B.Eng. in Artificial Intelligence"
            school = { name = "Beijing University of Chemical Technology", url = "https://www.buct.edu.cn/" }
            date = "Sept 2020 - June 2024"
            content = "GPA: 3.12. Core: Machine Learning (90), Deep Learning (91), Computer Vision (91)."
        [[languages.en.params.education.items]]
            title = "Bachelor of Laws (Dual Degree)"
            school = { name = "Beijing University of Chemical Technology", url = "https://www.buct.edu.cn/" }
            date = "Sept 2024 - Present"
            content = "Focusing on AI compliance, safety, and trustworthy computing."

      [languages.en.params.contact]
        enable = true
        title = "Contact"
        content = "My inbox is always open. Whether you have a question or just want to say hi, I'll try my best to get back to you!"
        email = "WorkKunweiChen@outlook.com"
        btnName = "Mail me"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true