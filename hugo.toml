# ==========================================
# 全局基础配置
# ==========================================
baseURL = "https://csnoi.github.io/"
defaultContentLanguage = "zh-cn"
theme = "hugo-profile"
enableRobotsTXT = true

# ==========================================
# 全站通用参数配置 (彻底解决搜索框、导航对齐与底部图标)
# ==========================================
[params]
  title = "陈坤葳 | AI & Robotics"
  description = "AI算法工程师，专注于机器视觉、多传感器融合与AI可解释性理论"
  favicon = "/fav.png"
  
  # 🟢 导航栏全局配置
  [params.navbar]
    align = "ms-auto"      # 强制右对齐
    showLogo = true
    disableSearch = true   # 全局禁用搜索框

  # 🟢 底部全站通用配置
  [params.footer]
    trademark = true       # 显示六边形Logo
    copyright = "© 2026 All rights reserved"
    enable = true
    # 底部彩色图标矩阵
    [params.footer.socialNetworks]
      github = "https://github.com/CSNOi"
      instagram = "https://instagram.com/你的用户名"
      # linkedin = "https://linkedin.com/in/你的主页"

[languages]
