# ==========================================
# 全局基础配置
# ==========================================
baseURL = "https://csnoi.github.io/"
defaultContentLanguage = "zh-cn"
theme = "hugo-profile"
enableRobotsTXT = true

# ==========================================
# 全站通用参数配置 (彻底解决对齐与搜索框)
# ==========================================
[params]
  title = "陈坤葳个人主页"
  description = "AI算法工程师，专注于机器视觉、多传感器融合与AI可解释性理论"
  favicon = "/fav.png"
  disableSearch = true      # 全局禁用搜索

  [params.navbar]
    align = "ms-auto"      # 强制菜单靠右对齐
    showLogo = true
    disableSearch = true   # 彻底禁用搜索框，消除白条

  [params.footer]
    enable = true
    trademark = true       
    copyright = "© 2026 All rights reserved"
    [params.footer.socialNetworks]
      github = "https://github.com/CSNOi"
      instagram = "https://www.instagram.com/topocat001"

[languages]
  # ----------------------------------------
  # 1. 中文版配置 (zh-cn)
  # ----------------------------------------
  [languages.zh-cn]
    title = "陈坤葳主页"
    languageName = "中/CN"
    weight = 1
    # 🟢 适配目录结构：导航菜单指向 /blogs 文件夹
    [[languages.zh-cn.menu.main]]
      name = "关于我"
      url = "/#about"
      weight = 1
    [[languages.zh-cn.menu.main]]
      name = "博客"
      url = "/blogs"
      weight = 2
    [[languages.zh-cn.menu.main]]
      name = "画廊"
      url = "/gallery"
      weight = 3

    [languages.zh-cn.params]
      title = "陈坤葳"
      image = "/img/profile.jpg"
      
      [languages.zh-cn.params.navbar]
        align = "ms-auto"
        logoText = "陈坤葳"
        
      [languages.zh-cn.params.hero]
        enable = true
        title = "你好，我是 陈坤葳"
        subtitle = "深耕 AI 可解释性理论与高精度 VSLAM 定位"
        content = "北京化工大学人工智能背景，法学双学位复合背景。目前担任算法工程师，致力于让黑盒模型变得透明，让机器人感知更加精准。"
        image = "/img/profile.jpg" 
        
        [languages.zh-cn.params.hero.button]
          enable = true
          name = "查看简历"
          url = "/resume.pdf"
          download = false

        [languages.zh-cn.params.hero.socialLinks]
          [[languages.zh-cn.params.hero.socialLinks.fontAwesomeIcons]]
              icon = "fab fa-github"
              url = "https://github.com/CSNOi"
          [[languages.zh-cn.params.hero.socialLinks.fontAwesomeIcons]]
